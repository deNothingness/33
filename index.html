<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1f22;--surface:#2b2d31;--raised:#383a40;
  --border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.1);
  --text:#dbdee1;--text2:#b5bac1;--text3:#80848e;
  --accent:#5865f2;--accent-h:#4752c4;--danger:#ed4245;
  --green:#3ba55c;--red:#ed4245;
  --gold:#f5b042;--silver:#c0c4c9;--bronze:#cd7f56;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.45}

/* BG ART */
.bg-art{position:fixed;left:0;top:0;width:340px;height:100vh;pointer-events:none;z-index:0;display:flex;align-items:center;justify-content:flex-end;padding-right:20px}
.bg-art img{width:280px;height:280px;object-fit:cover;border-radius:50%;opacity:0.07;filter:blur(1px) saturate(0.6);user-select:none}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:var(--text3)}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;align-items:center;justify-content:center}
.auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:2.5rem 3rem;text-align:center;max-width:360px;width:90%}
.auth-box img{width:72px;height:72px;border-radius:50%;margin-bottom:1rem}
.auth-box h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.auth-box p{font-size:14px;color:var(--text3);margin-bottom:1.8rem}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:40px;background:#fff;color:#1a1a1a;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-google:hover{background:#f0f0f0;transform:translateY(-1px)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}

/* CONTAINER */
.container{max-width:1000px;margin:0 auto;padding:1.8rem 1.8rem 4rem;position:relative;z-index:1;display:none}

/* USER BAR */
.user-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding:6px 6px 6px 14px;background:var(--surface);border-radius:40px;width:fit-content}
.user-bar img{width:26px;height:26px;border-radius:50%;object-fit:cover}
.user-bar span{font-size:13px;color:var(--text2)}
.btn-signout{background:transparent;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;padding:5px 12px;border-radius:20px;transition:.2s}
.btn-signout:hover{color:var(--danger);background:rgba(237,66,69,0.1)}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s;flex-shrink:0}
.save-dot.show{opacity:1}

/* TITLE */
.page-title{margin-bottom:1.5rem;display:flex;align-items:center;gap:14px}
.page-title-text{font-size:42px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-title-badge{font-size:13px;font-weight:600;color:var(--text2);background:var(--surface);padding:5px 14px;border-radius:30px;border:1px solid var(--border2)}

/* TABS — горизонтальный скролл на мобиле */
.tabs-wrap{margin-bottom:1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;min-width:max-content;padding-bottom:2px}
.tab-wrapper{display:inline-flex;align-items:center;background:var(--surface);border-radius:40px;flex-shrink:0}
.tab{padding:8px 16px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--text2);white-space:nowrap}
.tab:hover{background:var(--raised);color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.tab-delete{background:transparent;color:var(--text3);border:none;font-size:13px;cursor:pointer;padding:8px 12px 8px 4px;transition:.2s;border-radius:0 40px 40px 0}
.tab-delete:hover{color:var(--danger);background:rgba(237,66,69,0.12)}
.tab-add{padding:8px 16px;border-radius:40px;font-weight:500;font-size:14px;font-family:inherit;cursor:pointer;background:transparent;border:1px dashed var(--border2);color:var(--text3);transition:.2s;white-space:nowrap;flex-shrink:0}
.tab-add:hover{border-color:var(--accent);color:var(--accent);background:rgba(88,101,242,0.08)}

/* CRITERIA — горизонтальный скролл */
.criteria-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:1.5rem}
.criteria-wrap::-webkit-scrollbar{display:none}
.criteria-bar{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;background:var(--surface);padding:8px 14px;border-radius:40px;width:fit-content;min-width:max-content}
.criteria-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.criteria-chip input{background:var(--raised);padding:5px 12px;border:1px solid var(--border2);border-radius:30px;font-size:13px;font-weight:500;color:var(--text);width:108px;font-family:inherit;outline:none;text-align:center;transition:.15s}
.criteria-chip input:focus{border-color:var(--accent)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1.8rem}
.search-row{display:flex;gap:10px;align-items:center}
.search-row input{flex:1;padding:12px 16px 12px 44px;border-radius:48px;border:1px solid var(--border2);background:var(--surface);font-size:14px;color:var(--text);font-family:inherit;transition:.2s}
.search-row input::placeholder{color:var(--text3)}
.search-row input:focus{outline:none;border-color:var(--accent);background:var(--raised)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.btn-manual{padding:11px 18px;border-radius:40px;border:1px solid var(--border2);background:transparent;font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:inherit;transition:.2s}
.btn-manual:hover{background:var(--raised);color:var(--text);border-color:var(--accent)}

/* DROPDOWN */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--raised);border:1px solid var(--border2);border-radius:var(--r-md);z-index:100;max-height:440px;overflow-y:auto;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.dropdown.show{display:block}
.dd-item,.dd-manual{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.dd-item:last-child,.dd-manual{border-bottom:none}
.dd-item:hover,.dd-manual:hover{background:rgba(255,255,255,0.05)}
.dd-poster{width:36px;height:52px;object-fit:cover;border-radius:6px;background:var(--surface);flex-shrink:0}
.dd-poster-yt{width:80px;height:45px;object-fit:cover;border-radius:6px;background:var(--surface);flex-shrink:0}
.dd-poster-ph{width:36px;height:52px;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.dd-info{flex:1;min-width:0}
.dd-title{font-weight:600;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-meta{font-size:11px;color:var(--text3);margin-top:2px}
.dd-rating{font-size:12px;font-weight:500;background:var(--surface);padding:3px 8px;border-radius:30px;flex-shrink:0}
.dd-hint{padding:14px;font-size:13px;color:var(--text3)}

/* LIST */
.list{display:flex;flex-direction:column;gap:8px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 18px;display:grid;align-items:start;gap:14px;transition:.2s}
.item:hover{border-color:var(--border2);background:var(--raised)}
.item.has-poster{grid-template-columns:44px 64px 1fr auto}
.item.has-poster-yt{grid-template-columns:44px 140px 1fr auto}
.item.no-poster{grid-template-columns:44px 1fr auto}
@media(max-width:600px){
  .container{padding:1rem 0.75rem 4rem}
  .page-title-text{font-size:32px}
  /* на мобиле прячем постер в сетке чтобы не ломать layout */
  .item.has-poster,.item.has-poster-yt,.item.no-poster{grid-template-columns:32px 1fr auto}
  .item-poster,.item-poster-sq,.item-poster-yt{display:none}
  .item{padding:10px 12px;gap:8px}
  .avg-num{font-size:20px}
  .avg-badge{min-width:56px;padding:5px 10px}
  .btn-manual{padding:10px 12px;font-size:13px}
  .search-row input{font-size:13px;padding:10px 12px 10px 38px}
}
.rank-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-top:2px}
.rank{font-size:18px;font-weight:700;color:var(--text3);text-align:right}
.rank.gold{color:var(--gold);font-size:24px}
.rank.silver{color:var(--silver);font-size:22px}
.rank.bronze{color:var(--bronze);font-size:20px}
.rank-delta{display:flex;align-items:center;gap:2px;font-size:11px;font-weight:600;white-space:nowrap}
.rank-delta.up{color:var(--green)}.rank-delta.down{color:var(--red)}.rank-delta.same{color:var(--text3);font-size:10px}
.rank-delta i{font-size:12px}
.item-poster{width:64px;height:96px;object-fit:cover;border-radius:8px;background:var(--raised);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.item-poster-sq{width:64px;height:64px;object-fit:cover;border-radius:8px;background:var(--raised);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.item-poster-yt{width:140px;height:79px;object-fit:cover;border-radius:8px;background:var(--raised);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.item-body{display:flex;flex-direction:column;gap:8px;min-width:0}
.item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-title-link{font-size:15px;font-weight:700;color:#fff;line-height:1.3;word-break:normal;overflow-wrap:anywhere;text-decoration:none;transition:color .15s}
.item-title-link:hover{color:var(--accent)}
.item-title{font-size:15px;font-weight:700;color:#fff;line-height:1.3;word-break:normal;overflow-wrap:anywhere}
.item-title-input{font-size:15px;font-weight:700;background:var(--raised);border:1px solid var(--accent);border-radius:8px;padding:4px 8px;color:#fff;width:100%;font-family:inherit;outline:none}
.item-meta{font-size:12px;color:var(--text2);margin-top:2px}
/* scores — горизонтальный скролл на мобиле, не переносятся */
.scores-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:2px}
.scores-wrap::-webkit-scrollbar{display:none}
.scores{display:flex;gap:8px;flex-wrap:nowrap;align-items:flex-end;min-width:max-content}
.score-field{display:flex;flex-direction:column;gap:3px;background:var(--raised);padding:5px 10px;border-radius:30px;flex-shrink:0}
.score-field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase}
.score-field input{width:54px;padding:5px 0;text-align:center;background:var(--surface);border:1px solid var(--border2);border-radius:30px;font-size:14px;font-weight:600;color:var(--text);font-family:inherit;transition:.15s}
.score-field input:focus{outline:none;border-color:var(--accent)}
.extra-badge{background:var(--raised);padding:5px 12px;border-radius:30px;display:inline-flex;flex-direction:column;max-width:130px}
.extra-badge label{font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600}
.extra-val{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avg-badge{background:var(--raised);padding:6px 12px;border-radius:40px;text-align:center;min-width:68px}
.avg-num{font-size:24px;font-weight:800;line-height:1}
.avg-label{font-size:10px;color:var(--text3)}
.avg-score-10{color:#2ecc71}.avg-score-9{color:#27ae60}.avg-score-8{color:#f1c40f}
.avg-score-7{color:#f39c12}.avg-score-6{color:#e67e22}.avg-score-5{color:#e74c3c}
.avg-score-4{color:#c0392b}.avg-score-3{color:#e74c3c}.avg-score-2{color:#c0392b}
.avg-score-1{color:#a93226}.avg-score-0{color:#7b241c}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:30px;transition:.2s;flex-shrink:0}
.del-btn:hover{color:var(--danger);background:rgba(237,66,69,0.1)}
.empty-row{border:1px dashed var(--border2);border-radius:var(--r-md);padding:10px 18px;display:flex;gap:16px;opacity:.3}
.empty-rank{font-size:14px;font-weight:600;min-width:28px;color:var(--text3)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--raised);border-radius:var(--r-lg);padding:1.5rem;width:480px;max-width:92vw;border:1px solid var(--border2);box-shadow:0 16px 48px rgba(0,0,0,0.6)}
.modal h3{font-size:20px;font-weight:700;margin-bottom:1rem}
.modal input[type=text]{width:100%;padding:10px 14px;border-radius:40px;background:var(--surface);border:1px solid var(--border2);font-size:14px;margin-bottom:10px;color:var(--text);font-family:inherit;outline:none;transition:.15s}
.modal input[type=text]:focus{border-color:var(--accent)}
.modal-note{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.crit-row{display:flex;gap:8px;margin-bottom:12px}
.crit-row input{flex:1;margin-bottom:0}
.radio-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.radio-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text2);padding:6px 12px;border-radius:30px;border:1px solid var(--border2);transition:.15s}
.radio-row label:hover{border-color:var(--accent);color:var(--accent)}
.radio-row input[type=radio]{accent-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-ok,.btn-cancel{padding:9px 22px;border-radius:40px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;transition:.15s}
.btn-ok{background:var(--accent);color:#fff;border:none}
.btn-ok:hover{background:var(--accent-h)}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-cancel:hover{background:rgba(255,255,255,0.05)}
.btn-danger{background:var(--danger);border:none}
.btn-danger:hover{background:#c0392b}
</style>
</head>

    if (snap.exists()) { const d = snap.data(); if (d.categories) state = d; }
  } catch(e) { console.error(e); }
}
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!uid) return;
    try {
      await setDoc(doc(db,"users",uid), state);
      const dot = document.getElementById("save-dot");
      dot.classList.add("show");
      setTimeout(() => dot.classList.remove("show"), 1400);
    } catch(e) { console.error(e); }
  }, 1200);
}

// ── Auth ──
document.getElementById("btn-signin").onclick  = () => signInWithPopup(auth, provider).catch(console.error);
document.getElementById("btn-signout").onclick = () => fbSignOut(auth);

onAuthStateChanged(auth, async user => {
  document.getElementById("loading").style.display = "none";
  if (user) {
    uid = user.uid;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-photo").src = user.photoURL || "";
    document.getElementById("user-name").textContent = user.displayName || user.email;
    await loadCloud();
    render();
  } else {
    uid = null;
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// ── Helpers ──
const cat  = () => state.categories[state.activeCat];
const esc  = s  => String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const avgC = a  => a===null?"":"avg-score-"+Math.round(Math.min(10,Math.max(0,a)));

function avg(item) {
  const v = item.scores.filter(x => x!==null && x!=="");
  return v.length ? v.reduce((a,b)=>a+Number(b),0)/v.length : null;
}
function rankSorted() {
  return [...cat().items].sort((a,b)=>{
    const av=avg(a),bv=avg(b);
    if(av===null&&bv===null)return 0;
    if(av===null)return 1; if(bv===null)return -1;
    return bv-av;
  });
}

// ── Render ──
function render() { renderTabs(); renderCriteria(); renderList(); }

function renderTabs() {
  let h = "";
  state.categories.forEach((c,i) => {
    h += `<div class="tab-wrapper">
      <button class="tab ${i===state.activeCat?"active":""}" data-idx="${i}">${esc(c.name)}</button>
      ${state.categories.length>1?`<button class="tab-delete" data-delidx="${i}" title="Удалить">✕</button>`:""}
    </div>`;
  });
  h += `<button class="tab-add" id="btn-new-cat">+ Категория</button>`;
  document.getElementById("tabs").innerHTML = h;

  document.querySelectorAll(".tab[data-idx]").forEach(b =>
    b.addEventListener("click", () => { state.activeCat=+b.dataset.idx; render(); closeDD(); document.getElementById("search-input").value=""; })
  );
  document.querySelectorAll(".tab-delete[data-delidx]").forEach(b =>
    b.addEventListener("click", () => { delIdx=+b.dataset.delidx; document.getElementById("overlay-del").classList.add("show"); })
  );
  document.getElementById("btn-new-cat").addEventListener("click", openCatModal);
}

function renderCriteria() {
  const c = cat();
  document.getElementById("criteria-bar").innerHTML =
    '<span class="criteria-label">Критерии</span>' +
    c.criteria.map((cr,i) =>
      `<div class="criteria-chip"><input value="${esc(cr)}" maxlength="20" data-ci="${i}"/></div>`
    ).join("");
  document.getElementById("cat-label").textContent = c.name;
  const ph = {tmdb:"🎬 Поиск фильма...",lastfm:"🎵 Поиск трека...",youtube:"📺 Поиск на YouTube...",rawg:"🎮 Поиск игры...",none:"✏️ Введи название..."};
  document.getElementById("search-input").placeholder = ph[c.srcType]||"✏️ Введи название...";
  document.querySelectorAll(".criteria-chip input").forEach(inp =>
    inp.addEventListener("change", () => { cat().criteria[+inp.dataset.ci]=inp.value; scheduleSave(); })
  );
}

function renderList() {
  const list = rankSorted(), c = cat();
  let h = "";
  for (let r=1; r<=33; r++) {
    const item = list[r-1];
    if (!item) { h+=`<div class="empty-row"><span class="empty-rank">${r}</span><div style="flex:1;height:1px;background:var(--border2)"></div></div>`; continue; }
    const a=avg(item), aStr=a!==null?a.toFixed(1):"—";
    const isYT=c.srcType==="youtube", isMus=c.srcType==="lastfm";
    const hasPoster=!!item.poster;

    // delta
    let delta="";
    if (item.prevRank!==undefined && item.prevRank!==r) {
      const d=item.prevRank-r;
      delta=d>0?`<div class="rank-delta up"><i class="ti ti-arrow-up"></i>+${d}</div>`
               :`<div class="rank-delta down"><i class="ti ti-arrow-down"></i>${d}</div>`;
    } else if (item.prevRank!==undefined && a!==null) delta=`<div class="rank-delta same">—</div>`;

    const rankCls = r===1?"gold":r===2?"silver":r===3?"bronze":"";
    let posterEl="";
    if (hasPoster) {
      const cls=isYT?"item-poster-yt":isMus?"item-poster-sq":"item-poster";
      posterEl=`<img class="${cls}" src="${esc(item.poster)}" loading="lazy" onerror="this.style.display='none'"/>`;
    }
    let titleEl="";
    if (item.link) titleEl=`<a class="item-title-link" href="${esc(item.link)}" target="_blank" rel="noopener">${esc(item.name)||"—"}</a>`;
    else titleEl=`<div class="item-title" data-editid="${item.id}" style="cursor:default">${esc(item.name)||"—"}</div>`;

    let extra="";
    if (item.channelTitle)
      extra=`<div class="extra-badge"><label>${isMus?"Исполнитель":"Канал"}</label><div class="extra-val">${esc(item.channelTitle)}</div></div>`;
    else if (item.genre)
      extra=`<div class="extra-badge"><label>Жанр</label><div class="extra-val">${esc(item.genre)}</div></div>`;
    if (item.apiRating)
      extra+=`<div class="extra-badge"><label>${isMus?"Слушатели":"Рейтинг"}</label><div class="extra-val">${esc(String(item.apiRating))}</div></div>`;

    const gridCls=hasPoster?(isYT?"has-poster-yt":"has-poster"):"no-poster";
    h+=`<div class="item ${gridCls}">
      <div class="rank-col"><span class="rank ${rankCls}">${r}</span>${delta}</div>
      ${posterEl}
      <div class="item-body">
        <div class="item-header">
          <div style="flex:1;min-width:0">${titleEl}${item.year?`<div class="item-meta">📅 ${esc(item.year)}</div>`:""}</div>
          <button class="del-btn" data-delitem="${item.id}"><i class="ti ti-trash"></i></button>
        </div>
        <div class="scores-wrap"><div class="scores">
          ${c.criteria.map((cr,i)=>`<div class="score-field"><label>${esc(cr)}</label>
            <input type="number" min="0" max="10" step="0.1" value="${item.scores[i]!==null?item.scores[i]:""}" placeholder="—" data-sid="${item.id}" data-si="${i}"/></div>`).join("")}
          ${extra}
        </div></div>
      </div>
      <div class="avg-badge"><div class="avg-num ${avgC(a)}">${aStr}</div><div class="avg-label">средняя</div></div>
    </div>`;
  }
  document.getElementById("list").innerHTML = h;

  // bind score inputs
  document.querySelectorAll("input[data-sid]").forEach(inp => {
    inp.addEventListener("change", () => {
      const before={};
      rankSorted().forEach((it,i)=>{ before[it.id]=i+1; });
      const it=cat().items.find(x=>x.id===inp.dataset.sid); if(!it)return;
      const n=parseFloat(inp.value);
      it.scores[+inp.dataset.si]=(inp.value===""||isNaN(n))?null:Math.min(10,Math.max(0,Math.round(n*10)/10));
      rankSorted().forEach((it,i)=>{ it.prevRank=before[it.id]||(i+1); });
      scheduleSave(); renderList();
    });
  });
  document.querySelectorAll(".del-btn[data-delitem]").forEach(b =>
    b.addEventListener("click", () => { cat().items=cat().items.filter(x=>x.id!==b.dataset.delitem); scheduleSave(); renderList(); })
  );
}

// ── Add item ──
function addItem(data) {
  if (cat().items.length>=33) return;
  cat().items.push({
    id: Date.now()+"-"+Math.random().toString(36).slice(2),
    name:data.name||"", poster:data.poster||null, year:data.year||"",
    genre:data.genre||"", link:data.link||null,
    channelTitle:data.channelTitle||"", apiRating:data.apiRating||"",
    scores:[null,null,null], prevRank:cat().items.length+1
  });
  scheduleSave(); render();
}

document.getElementById("btn-add-manual").addEventListener("click", addManual);
document.getElementById("search-input").addEventListener("keydown", e => {
  if (e.key==="Enter") addManual();
  if (e.key==="Escape") closeDD();
});
document.addEventListener("click", e => { if (!document.getElementById("search-wrap").contains(e.target)) closeDD(); });

function addManual() {
  const v=document.getElementById("search-input").value.trim();
  if (v) addItem({name:v});
  document.getElementById("search-input").value=""; closeDD();
}

// expose for inline onclick in dropdown
window._pick = data => { addItem(data); closeDD(); document.getElementById("search-input").value=""; };
window._addDD = name => { addItem({name}); closeDD(); document.getElementById("search-input").value=""; };

// ── Search ──
let st2;
document.getElementById("search-input").addEventListener("input", () => {
  clearTimeout(st2);
  const q=document.getElementById("search-input").value.trim();
  if (!q) { closeDD(); return; }
  st2=setTimeout(()=>search(q),380);
});

const DD = () => document.getElementById("dropdown");
function closeDD() { DD().classList.remove("show"); DD().innerHTML=""; }
function manualRow(q) {
  const s=q.replace(/'/g,"\'");
  return `<div class="dd-manual" onclick="_addDD('${s}')"><div class="dd-poster-ph">✏️</div><div class="dd-info"><div class="dd-title">Добавить «${esc(q)}» вручную</div></div></div>`;
}

async function search(q) {
  const src=cat().srcType;
  DD().innerHTML='<div class="dd-hint">🔎 Ищем...</div>'; DD().classList.add("show");
  if      (src==="tmdb")    await sTMDB(q);
  else if (src==="lastfm")  await sLFM(q);
  else if (src==="youtube") await sYT(q);
  else if (src==="rawg")    await sRAWG(q);
  else DD().innerHTML=manualRow(q);
}

async function sTMDB(q){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(q)}&language=ru&page=1`,{headers:{Authorization:`Bearer ${TMDB}`}});
    const d=await r.json(); const res=(d.results||[]).slice(0,7);
    if(!res.length){DD().innerHTML=manualRow(q);return;}
    DD().innerHTML=res.map(m=>{
      const poster=m.poster_path?`https://image.tmdb.org/t/p/w154${m.poster_path}`:"";
      const year=m.release_date?m.release_date.slice(0,4):"";
      const rating=m.vote_average?m.vote_average.toFixed(1):"";
      const data=JSON.stringify({name:m.title,poster,year,link:`https://www.themoviedb.org/movie/${m.id}`,apiRating:rating}).replace(/'/g,"&#39;");
      return `<div class="dd-item" onclick="_pick(${data.replace(/"/g,"'")})">
        ${poster?`<img class="dd-poster" src="${poster}"/>`:'<div class="dd-poster-ph">🎬</div>'}
        <div class="dd-info"><div class="dd-title">${esc(m.title)}</div><div class="dd-meta">${year}</div></div>
        ${rating?`<div class="dd-rating">⭐ ${rating}</div>`:""}
      </div>`;
    }).join("")+manualRow(q);
  }catch(e){DD().innerHTML='<div class="dd-hint">TMDB недоступен</div>'+manualRow(q);}
}

async function sLFM(q){
  try{
    const r=await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.search&track=${encodeURIComponent(q)}&api_key=${LASTFM}&format=json&limit=7`);
    if(!r.ok)throw 0;
    const d=await r.json();
    const tracks=(d.results?.trackmatches?.track||[]).slice(0,7);
    if(!tracks.length){DD().innerHTML=manualRow(q);return;}
    const rows=await Promise.all(tracks.map(async t=>{
      let cover="",listeners="",album="",link=t.url||"";
      try{
        const ri=await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&track=${encodeURIComponent(t.name)}&artist=${encodeURIComponent(t.artist)}&api_key=${LASTFM}&format=json`);
        const di=await ri.json();
        const imgs=di.track?.album?.image||[];
        const lg=imgs.find(x=>x.size==="large")||imgs[imgs.length-1];
        cover=lg?.["#text"]||"";
        album=di.track?.album?.title||"";
        const raw=parseInt(di.track?.listeners||"0");
        if(raw>0)listeners=raw>1e6?(raw/1e6).toFixed(1)+"M":raw>1e3?(raw/1e3).toFixed(0)+"K":String(raw);
      }catch(e){}
      const data=JSON.stringify({name:`${t.name} — ${t.artist}`,poster:cover,year:"",link,channelTitle:t.artist,apiRating:listeners?listeners+" слуш.":""}).replace(/'/g,"&#39;");
      return `<div class="dd-item" onclick="_pick(${data.replace(/"/g,"'")})">
        ${cover?`<img class="dd-poster" src="${cover}" style="width:44px;height:44px;border-radius:6px;object-fit:cover"/>`:'<div class="dd-poster-ph" style="width:44px;height:44px;">🎵</div>'}
        <div class="dd-info"><div class="dd-title">${esc(t.name)}</div><div class="dd-meta">${esc(t.artist)}${album?" · "+esc(album):""}</div></div>
        ${listeners?`<div class="dd-rating">👂 ${listeners}</div>`:""}
      </div>`;
    }));
    DD().innerHTML=rows.join("")+manualRow(q);
  }catch(e){DD().innerHTML='<div class="dd-hint">Last.fm недоступен</div>'+manualRow(q);}
}

async function sYT(q){
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=7&q=${encodeURIComponent(q)}&type=video&key=${YT}`);
    if(!r.ok)throw 0;
    const d=await r.json();
    if(!(d.items||[]).length){DD().innerHTML=manualRow(q);return;}
    DD().innerHTML=d.items.map(v=>{
      const vid=v.id.videoId;
      const data=JSON.stringify({name:v.snippet.title,poster:`https://i.ytimg.com/vi/${vid}/mqdefault.jpg`,year:"",link:`https://www.youtube.com/watch?v=${vid}`,channelTitle:v.snippet.channelTitle}).replace(/'/g,"&#39;");
      return `<div class="dd-item" onclick="_pick(${data.replace(/"/g,"'")})">
        <img class="dd-poster-yt" src="https://i.ytimg.com/vi/${vid}/mqdefault.jpg"/>
        <div class="dd-info"><div class="dd-title">${esc(v.snippet.title)}</div><div class="dd-meta">${esc(v.snippet.channelTitle)}</div></div>
      </div>`;
    }).join("")+manualRow(q);
  }catch(e){DD().innerHTML='<div class="dd-hint">YouTube недоступен</div>'+manualRow(q);}
}

async function sRAWG(q){
  try{
    const r=await fetch(`https://api.rawg.io/api/games?search=${encodeURIComponent(q)}&page_size=7&key=${RAWG}`);
    if(!r.ok)throw 0;
    const d=await r.json(); const games=(d.results||[]).slice(0,7);
    if(!games.length){DD().innerHTML=manualRow(q);return;}
    DD().innerHTML=games.map(g=>{
      const rating=g.metacritic?String(g.metacritic):g.rating?g.rating.toFixed(1):"";
      const data=JSON.stringify({name:g.name,poster:g.background_image||"",year:g.released?g.released.slice(0,4):"",link:`https://rawg.io/games/${g.slug}`,apiRating:rating}).replace(/'/g,"&#39;");
      return `<div class="dd-item" onclick="_pick(${data.replace(/"/g,"'")})">
        ${g.background_image?`<img class="dd-poster" src="${g.background_image}"/>`:'<div class="dd-poster-ph">🎮</div>'}
        <div class="dd-info"><div class="dd-title">${esc(g.name)}</div><div class="dd-meta">${g.released?g.released.slice(0,4):""}</div></div>
        ${rating?`<div class="dd-rating">⭐ ${rating}</div>`:""}
      </div>`;
    }).join("")+manualRow(q);
  }catch(e){DD().innerHTML='<div class="dd-hint">RAWG недоступен</div>'+manualRow(q);}
}

// ── Category modals ──
function openCatModal() { document.getElementById("overlay-cat").classList.add("show"); document.getElementById("cat-name-input").focus(); }
function closeCatModal(){ document.getElementById("overlay-cat").classList.remove("show"); }
document.getElementById("overlay-cat").addEventListener("click",e=>{if(e.target===document.getElementById("overlay-cat"))closeCatModal();});
document.getElementById("btn-close-cat").addEventListener("click",closeCatModal);
document.getElementById("btn-create-cat").addEventListener("click",()=>{
  const name=document.getElementById("cat-name-input").value.trim(); if(!name)return;
  const c1=document.getElementById("nc1").value.trim()||"Критерий 1";
  const c2=document.getElementById("nc2").value.trim()||"Критерий 2";
  const c3=document.getElementById("nc3").value.trim()||"Критерий 3";
  let srcType="none";
  for(const rb of document.getElementsByName("srcType"))if(rb.checked)srcType=rb.value;
  state.categories.push({name,criteria:[c1,c2,c3],srcType,items:[]});
  state.activeCat=state.categories.length-1;
  document.getElementById("cat-name-input").value="";
  ["nc1","nc2","nc3"].forEach(id=>document.getElementById(id).value="");
  closeCatModal(); scheduleSave(); render();
});

document.getElementById("overlay-del").addEventListener("click",e=>{if(e.target===document.getElementById("overlay-del"))document.getElementById("overlay-del").classList.remove("show");});
document.getElementById("btn-cancel-del").addEventListener("click",()=>document.getElementById("overlay-del").classList.remove("show"));
document.getElementById("btn-confirm-del").addEventListener("click",()=>{
  if(delIdx!==null&&state.categories.length>1){
    state.categories.splice(delIdx,1);
    if(state.activeCat>=state.categories.length)state.activeCat=state.categories.length-1;
    scheduleSave(); render();
  }
  document.getElementById("overlay-del").classList.remove("show"); delIdx=null;
});
</script>
